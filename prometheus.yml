global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: '/metrics'

  - job_name: 'patient-service'
    static_configs:
      - targets: ['patient-service:3001']
    metrics_path: '/metrics'

  - job_name: 'doctor-service'
    static_configs:
      - targets: ['doctor-service:3002']
    metrics_path: '/metrics'

  - job_name: 'appointment-service'
    static_configs:
      - targets: ['appointment-service:3003']
    metrics_path: '/metrics'

  - job_name: 'pharmacy-service'
    static_configs:
      - targets: ['pharmacy-service:3004']
    metrics_path: '/metrics'
