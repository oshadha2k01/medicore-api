apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medicore
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: medicore/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: medicore-secrets
              key: jwt-secret
        - name: PATIENT_SERVICE_URL
          value: "http://patient-service:3001"
        - name: DOCTOR_SERVICE_URL
          value: "http://doctor-service:3002"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:3003"
        - name: PHARMACY_SERVICE_URL
          value: "http://pharmacy-service:3004"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medicore
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api-gateway
